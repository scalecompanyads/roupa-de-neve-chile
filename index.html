<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nevou no Chile | Links</title>
    <meta
      name="description"
      content="Links oficiais da Nevou no Chile para catálogo, atendimento, agendamento e localização."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="links-page">
      <header class="brand-header">
        <img src="LOGO/Logo Branca.png" alt="Nevou no Chile" />

      <nav class="showroom-links" aria-label="Links principais">
        <a
          class="showroom-card catalog-card"

          rel="noopener"

          <span class="card-overlay"></span>
          <span class="card-cta">
            <strong>Catálogo</strong>
            <span>Conheça nossos looks</span>
          </span>
        </a>

        <a
          class="showroom-card service-card"
          href="https://wa.me/5521973221855?text=Ol%C3%A1%21%20Vim%20pelo%20site%20da%20Nevou%20no%20Chile%20e%20gostaria%20de%20falar%20com%20um%20especialista."

          rel="noopener"
        >
          <span class="card-overlay"></span>
          <span class="card-cta">
            <strong>Atendimento</strong>
            <span>Falar com especialista</span>
          </span>
        </a>

        <a
          class="showroom-card booking-card"
          href="https://calendly.com/nevounochile/30min"
          target="_blank"
          rel="noopener"
        >
          <span class="card-overlay"></span>
          <span class="card-cta">
            <strong>Visite nossa loja</strong>
            <span>Agende seu horário</span>
          </span>
        </a>

    </main>
