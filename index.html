<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nevou no Chile | Links</title>
    <meta
      name="description"
      content="Links oficiais da Nevou no Chile para catálogo, atendimento, agendamento e localização."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="links-page">
      <header class="brand-header">
        <img src="LOGO/Logo Branca.png" alt="Nevou no Chile" />
      </header>

      <nav class="showroom-links" aria-label="Links principais">
        <a class="showroom-card catalog-card" href="catalogo-nevou.pdf" target="_blank">
          <span class="card-overlay"></span>
          <span class="card-cta">
            <strong>Catálogo Nevou</strong>
            <span>Conheça nossos looks</span>
          </span>
        </a>

        <a
          class="showroom-card service-card"
          href="https://w.app/nevounochile"
          target="_blank"
          rel="noopener"
        >
          <span class="card-overlay"></span>
          <span class="card-cta">
            <strong>Atendimento showroom</strong>
            <span>Falar com especialista</span>
          </span>
        </a>

        <a
          class="showroom-card booking-card"
          href="https://api.whatsapp.com/send?text=Ol%C3%A1%2C%20quero%20agendar%20meu%20hor%C3%A1rio%20na%20Nevou%20no%20Chile."
          target="_blank"
          rel="noopener"
        >
          <span class="card-overlay"></span>
          <span class="card-cta">
            <strong>Agendamento showroom</strong>
            <span>Agende seu horário</span>
          </span>
        </a>

        <a
          class="showroom-card location-card"
          href="https://www.google.com/maps/search/?api=1&query=Nevou%20no%20Chile"
          target="_blank"
          rel="noopener"
        >
          <span class="card-overlay"></span>
          <span class="card-cta">
            <strong>Localização showroom</strong>
            <span>Encontre a Nevou</span>
          </span>
        </a>
      </nav>

    </main>
  </body>
</html>
